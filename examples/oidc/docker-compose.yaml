services:
  keycloak:
    container_name: oidc-keycloak
    image: quay.io/keycloak/keycloak:26.3
    command: ["start-dev", "--import-realm", "--http-port", "7080", "--https-port", "7443"]
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 7080
      KC_HOSTNAME_STRICT_BACKCHANNEL: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: info
    volumes:
    - ./agentgateway-realm.json:/opt/keycloak/data/import/agentgateway-realm.json:ro
    ports:
    - "7080:7080"
    - "7443:7443"

  app:
    container_name: oidc-upstream
    image: hashicorp/http-echo:1.0.0
    command: ["-listen=:5678", "-text=hello from the protected upstream app"]
    ports:
    - "18080:5678"
