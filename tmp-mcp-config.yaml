binds:
- port: 6553
  tunnelProtocol: direct
  listeners:
  - protocol: HTTP
    hostname: '*'
    routes:
    - hostnames: []
      matches:
      - path:
          pathPrefix: /
      backends:
      - service:
          name:
            namespace: default
            hostname: service
          port: 8080
        weight: 1
      name: route
