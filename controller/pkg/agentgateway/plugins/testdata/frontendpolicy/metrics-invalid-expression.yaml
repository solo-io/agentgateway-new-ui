apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: metrics-invalid-expression
  namespace: default
spec:
  targetRefs:
  - kind: Gateway
    name: test
    group: gateway.networking.k8s.io
  frontend:
    metrics:
      attributes:
        add:
        - expression: 'invalid_{{expression}}'
          name: bad_field

