apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: tracing-invalid-attribute
  namespace: default
spec:
  targetRefs:
  - kind: Gateway
    name: test
    group: gateway.networking.k8s.io
  frontend:
    tracing:
      backendRef:
        name: otel-collector
        port: 4318
      attributes:
        add:
        - name: trace.id
          expression: foolen_{{request.id}}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: default
spec:
  ports:
  - port: 4318

