apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agw
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
  frontend:
    networkAuthorization:
      action: Require
      policy:
        matchExpressions:
          - 'cidr("10.0.0.0/8").containsIP(source.address)'
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      frontend:
        networkAuthorization:
          require:
          - cidr("10.0.0.0/8").containsIP(source.address)
      key: frontend/default/agw:frontend-network-authz:default/test
      name:
        kind: AgentgatewayPolicy
        name: agw
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
status:
