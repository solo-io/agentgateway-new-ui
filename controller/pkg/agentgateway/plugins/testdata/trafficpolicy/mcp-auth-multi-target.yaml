apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: discovery
  namespace: default
spec:
  parentRefs:
    - name: test
      namespace: default
  rules:
    - backendRefs:
      - group: agentgateway.dev
        kind: AgentgatewayBackend
        name: test1
      - group: agentgateway.dev
        kind: AgentgatewayBackend
        name: test2
      - group: agentgateway.dev
        kind: AgentgatewayBackend
        name: test3
      - group: agentgateway.dev
        kind: AgentgatewayBackend
        name: dummy-oauth
      matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-authorization-server
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: dummy-oauth
  namespace: default
spec:
  mcp:
    targets:
      - name: mcp-target
        selector:
          namespaces:
            matchLabels:
              agentgateway.dev/never: dummy-value
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: test1
  namespace: default
spec:
  mcp:
    targets:
      - name: mcp-target
        static:
          host: mcp.test1.com
          port: 443
          path: /v1/mcp
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: test2
  namespace: default
spec:
  mcp:
    targets:
      - name: mcp-target
        static:
          host: mcp.test2.com
          port: 443
          path: /v1/mcp
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: test3
  namespace: default
spec:
  mcp:
    targets:
      - name: mcp-target
        static:
          host: mcp.test3.com
          port: 443
          path: /v1/mcp
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: test-jwks
  namespace: default
spec:
  static:
    host: login.test.com
    port: 443
  policies:
    tls: {}  # Enable TLS
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-auth
  namespace: default
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: test1
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: test2
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: test3
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: dummy-oauth
  backend:
    mcp:
      authentication:
        mode: Strict
        issuer: https://sts.windows.net/test-path/
        audiences:
          - api://test
        jwks:
          backendRef:
            name: test-jwks
            kind: AgentgatewayBackend
            group: agentgateway.dev
          jwksPath: test-path/discovery/v2.0/keys
        resourceMetadata:
          x-issuer: http://agentgateway.agentgateway-system.svc.cluster.local:7777/oauth-issuer
          authorizationServers:
            - https://mcp.k8s.test.info
          scopesSupported:
            - api://test/agentgateway
