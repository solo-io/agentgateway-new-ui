apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: global-rl-invalid-cel
  namespace: default
spec:
  targetRefs:
  - kind: Gateway
    name: test
    group: gateway.networking.k8s.io
  traffic:
    rateLimit:
      global:
        backendRef:
          name: rl-svc
          port: 4444
        domain: api-gateway
        descriptors:
        - entries:
          - name: user-agent
            expression: foolen_{{request.headers["user-agent"]}}
---
apiVersion: v1
kind: Service
metadata:
  name: rl-svc
  namespace: default
spec:
  ports:
  - port: 4444

