apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: example-policy
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
  traffic:
    cors:
      allowOrigins:
        - https://ignored.com
      maxAge: 5
status:
  ancestors:
    # A different controller.. we should not touch it
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: other-gw
      conditions:
        - lastTransitionTime: "2026-04-22T17:57:23Z"
          message: Accepted by fake controller
          reason: Valid
          status: "True"
          type: Accepted
      controllerName: other-controller.example.com/controller
    # our controller with stale status; we must wipe it out
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: some-old-gateway-stale
        namespace: agentgateway-base
      conditions:
        - lastTransitionTime: "2026-04-22T17:57:23Z"
          message: Policy accepted
          observedGeneration: 1
          reason: Valid
          status: "True"
          type: Accepted
        - lastTransitionTime: "2026-04-22T17:57:23Z"
          message: Attached to all targets
          observedGeneration: 1
          reason: Attached
          status: "True"
          type: Attached
      controllerName: agentgateway.dev/agentgateway
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/example-policy:cors:default/test
      name:
        kind: AgentgatewayPolicy
        name: example-policy
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
      traffic:
        cors:
          allowOrigins:
          - https://ignored.com
          maxAge: 5s
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayPolicy
  metadata:
    name: example-policy
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: other-gw
      conditions:
      - lastTransitionTime: fake
        message: Accepted by fake controller
        reason: Valid
        status: "True"
        type: Accepted
      controllerName: other-controller.example.com/controller
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test
        namespace: default
      conditions:
      - lastTransitionTime: fake
        message: Policy accepted
        reason: Valid
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: Attached to all targets
        reason: Attached
        status: "True"
        type: Attached
      controllerName: agentgateway.dev/agentgateway
