apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: be
  namespace: default
spec:
  mcp:
    targets:
      - name: mcp-target
        static:
          host: mcp-app.default.svc.cluster.local
          port: 8000
          protocol: StreamableHTTP
          path: override-sse
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-auth-resolver-backend-missing
  namespace: default
spec:
  targetRefs:
    - name: be
      kind: AgentgatewayBackend
      group: agentgateway.dev
  backend:
    mcp:
      authentication:
        issuer: https://sts.windows.net/test-path/
        jwks:
          jwksPath: test-path/discovery/v2.0/keys
          backendRef:
            group: agentgateway.dev
            kind: AgentgatewayBackend
            name: test-jwks
        audiences:
          - api://test
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        mcpAuthentication:
          audiences:
          - api://test
          issuer: https://sts.windows.net/test-path/
          mode: STRICT
          resourceMetadata: {}
      key: default/mcp-auth-resolver-backend-missing:mcp-authentication:default/be
      name:
        kind: AgentgatewayPolicy
        name: mcp-auth-resolver-backend-missing
        namespace: default
      target:
        backend:
          name: be
          namespace: default
status:
