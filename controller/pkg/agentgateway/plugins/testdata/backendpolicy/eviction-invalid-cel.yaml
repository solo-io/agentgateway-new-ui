apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: be
  namespace: default
spec:
  static:
    host: example.com
    port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: eviction-invalid-cel
  namespace: default
spec:
  targetRefs:
  - kind: AgentgatewayBackend
    name: be
    group: agentgateway.dev
  backend:
    health:
      unhealthyCondition: foolen_{{response.code}}

---
# Output
