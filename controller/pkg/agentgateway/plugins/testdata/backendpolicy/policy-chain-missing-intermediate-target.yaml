apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: via-missing
  namespace: default
spec:
  parentRefs:
    - name: test
  rules:
    - backendRefs:
        - name: ghost
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: policy-be
  namespace: default
spec:
  static:
    host: policy.example.com
    port: 80
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: chain-source
  namespace: default
spec:
  targetRefs:
    - kind: AgentgatewayBackend
      name: ghost
      group: agentgateway.dev
  backend:
    tunnel:
      backendRef:
        name: policy-be
        group: agentgateway.dev
        kind: AgentgatewayBackend
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: chain-target
  namespace: default
spec:
  targetRefs:
    - kind: AgentgatewayBackend
      name: policy-be
      group: agentgateway.dev
  backend:
    http:
      version: HTTP2
---
