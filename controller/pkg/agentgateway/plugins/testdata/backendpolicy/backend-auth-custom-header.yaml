apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: backend-auth-custom-header
  namespace: default
spec:
  targetRefs:
    - kind: HTTPRoute
      name: test
      group: gateway.networking.k8s.io
  backend:
    auth:
      key: my-api-key
      location:
        header:
          name: x-api-key
          prefix: "ApiKey "
---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        auth:
          key:
            authorizationLocation:
              header:
                name: x-api-key
                prefix: 'ApiKey '
            secret: my-api-key
      key: backend/default/backend-auth-custom-header:backend-auth:default/test
      name:
        kind: AgentgatewayPolicy
        name: backend-auth-custom-header
        namespace: default
      target:
        route:
          kind: HTTPRoute
          name: test
          namespace: default
status:
