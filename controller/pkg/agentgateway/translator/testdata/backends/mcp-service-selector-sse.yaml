apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  namespace: default
  name: mcp-service-selector
spec:
  mcp:
    targets:
    - name: mcp-services
      selector:
        services:
          matchLabels:
            app: mcp-server
    sessionRouting: Stateless
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-service-sse
  namespace: default
  labels:
    app: mcp-server
  annotations:
    agentgateway.dev/mcp-http-path: /custom-path
spec:
  ports:
  - name: mcp
    port: 8080
    appProtocol: agentgateway.dev/mcp-sse
---
# Output
output:
- gateway:
    Name: basic
    Namespace: default
  resource:
    backend:
      key: default/mcp-service-selector
      mcp:
        statefulMode: STATELESS
        targets:
        - backend:
            port: 8080
            service:
              hostname: mcp-service-sse.default.svc.cluster.local
              namespace: default
          name: mcp-service-sse-mcp
          protocol: SSE
      name:
        name: mcp-service-selector
        namespace: default
- canonical: true
  hostname: mcp-service-sse.default.svc.cluster.local
  name: mcp-service-sse
  namespace: default
  ports:
  - servicePort: 8080
status:
- apiVersion: agentgateway.dev/v1alpha1
  kind: AgentgatewayBackend
  metadata:
    name: mcp-service-selector
    namespace: default
  spec: null
  status:
    conditions:
    - lastTransitionTime: fake
      message: Backend successfully accepted
      reason: Accepted
      status: "True"
      type: Accepted
