          - hostOverride:
              host: custom.example.com
              port: 443
            name: backend
            openai:
              model: gpt-4o-mini
            pathPrefix: /api/v2
      inlinePolicies:
      - auth:
          passthrough: {}
      key: default/openai-host-path-prefix
      name:
        name: openai-host-path-prefix
        namespace: default
status:
