apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai-host-path-prefix
  namespace: default
spec:
  ai:
    provider:
      openai:
        model: "gpt-4o-mini"
      host: custom.example.com
      port: 443
      pathPrefix: /api/v2
  policies:
    auth:
      passthrough: {}
