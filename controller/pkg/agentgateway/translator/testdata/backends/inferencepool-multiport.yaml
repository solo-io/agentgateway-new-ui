apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: gateway-pool
  namespace: default
spec:
  appProtocol: kubernetes.io/h2c
  endpointPickerRef:
    failureMode: FailClose
    group: ""
    kind: Service
    name: gateway-pool-endpoint-picker
    port:
      number: 9002
  selector:
    matchLabels:
      app: gateway
  targetPorts:
    - number: 8080
    - number: 8081
---
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: inference-pool
  namespace: default
spec:
  targetRefs:
    - name: gateway-pool
      kind: InferencePool
      group: inference.networking.k8s.io
  validation:
    hostname: my.inference.pool.example.com
    wellKnownCACertificates: System
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-pool-endpoint-picker
  namespace: default
spec:
  ports:
    - port: 9002
      protocol: TCP
  selector:
    app: gateway
---
# Output
output:
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      backend:
        inferenceRouting:
          endpointPicker:
            port: 9002
            service:
              hostname: gateway-pool-endpoint-picker.default.svc.cluster.local
              namespace: default
          failureMode: FAIL_CLOSED
      key: default/gateway-pool:inference
      name:
        kind: InferencePool
        name: gateway-pool
        namespace: default
      target:
        service:
          hostname: gateway-pool.default.inference.cluster.local
          namespace: default
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      backend:
        backendTls:
          verification: INSECURE_ALL
      key: default/gateway-pool:inferencetls
      name:
        kind: InferencePool
        name: gateway-pool
        namespace: default
      target:
        service:
          hostname: gateway-pool-endpoint-picker.default.svc.cluster.local
          namespace: default
          port: 9002
- gateway:
    Name: basic
    Namespace: default
  resource:
    policy:
      backend:
        backendTls:
          hostname: my.inference.pool.example.com
      key: default/inference-pool:backend-tls:default/gateway-pool.default.inference.cluster.local
      name:
        kind: BackendTLSPolicy
        name: inference-pool
        namespace: default
      target:
        service:
          hostname: gateway-pool.default.inference.cluster.local
          namespace: default
- canonical: true
  hostname: gateway-pool-endpoint-picker.default.svc.cluster.local
  name: gateway-pool-endpoint-picker
  namespace: default
  ports:
  - servicePort: 9002
- hostname: gateway-pool.default.inference.cluster.local
  name: gateway-pool
  namespace: default
  ports:
  - appProtocol: HTTP2
    servicePort: 8080
    targetPort: 8080
  - appProtocol: HTTP2
    servicePort: 8081
    targetPort: 8081
status:
- apiVersion: inference.networking.k8s.io/v1
  kind: InferencePool
  metadata:
    name: gateway-pool
    namespace: default
  spec: null
  status:
    parents:
    - conditions:
      - lastTransitionTime: fake
        message: InferencePool has been accepted by controller agentgateway.dev/agentgateway
        reason: Accepted
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: All InferencePool references have been resolved
        reason: ResolvedRefs
        status: "True"
        type: ResolvedRefs
      controllerName: agentgateway.dev/agentgateway
      parentRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: basic
        namespace: default
- apiVersion: gateway.networking.k8s.io/v1
  kind: BackendTLSPolicy
  metadata:
    name: inference-pool
    namespace: default
  spec: null
  status:
    ancestors:
    - ancestorRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: basic
      conditions:
      - lastTransitionTime: fake
