apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: missing-dest
  namespace: default
spec:
  parentRefs:
  - name: test-gateway
  rules:
  - backendRefs:
    - name: unknown
      port: 8080
      weight: 2
    - name: cross-ns-no-ref-grant
      namespace: other
      port: 8080
      weight: 4
    - name: unknown-backend
      group: agentgateway.dev
      kind: AgentgatewayBackend
      weight: 6
    - name: unknown-kind
      group: example.com
      kind: NotBackend
      weight: 8
---
# Output
output:
- gateway:
    Name: test-gateway
    Namespace: default
  resource:
    route:
      backends:
      - backend:
          port: 8080
          service:
            hostname: unknown.default.svc.cluster.local
            namespace: default
        weight: 2
      - weight: 4
      - backend:
          backend: default/unknown-backend
        weight: 6
      - backend: {}
        weight: 8
      key: default/missing-dest.00.http
      listenerKey: default/test-gateway.http
      name:
        kind: HTTPRoute
        name: missing-dest
        namespace: default
status:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    name: missing-dest
    namespace: default
  spec: null
  status:
    parents:
    - conditions:
      - lastTransitionTime: fake
        message: ""
        reason: Accepted
        status: "True"
        type: Accepted
      - lastTransitionTime: fake
        message: 'referencing unsupported backendRef: group "example.com" kind "NotBackend"'
        reason: InvalidKind
        status: "False"
        type: ResolvedRefs
      controllerName: agentgateway.dev/agentgateway
      parentRef:
        group: gateway.networking.k8s.io
        kind: Gateway
        name: test-gateway
