        type: PathPrefix
        value: /anything/team1/bar
    backendRefs:
    - name: httpbin
      port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: team1
spec:
  ports:
  - port: 8000
---
