apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: parent
  namespace: default
spec:
  parentRefs:
    - name: test-gateway
  hostnames:
    - delegation.example
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anything/team1
      backendRefs:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: "*"
          namespace: team1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: child-team1-implicit
  namespace: team1
spec:
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anything/team1/implicit
      backendRefs:
        - name: httpbin
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: child-team1-explicit
  namespace: team1
spec:
  parentRefs:
    - name: parent
      namespace: default
      kind: HTTPRoute
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anything/team1/explicit
      backendRefs:
        - name: httpbin
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: child-team1-not
  namespace: team1
spec:
  parentRefs:
    - name: not-parent
      namespace: default
      kind: HTTPRoute
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anything/team1/not
      backendRefs:
        - name: httpbin
          port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  namespace: team1
spec:
  ports:
    - port: 8000
---
