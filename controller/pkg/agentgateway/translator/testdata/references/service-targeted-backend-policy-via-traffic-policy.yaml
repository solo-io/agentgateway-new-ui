apiVersion: v1
kind: Service
metadata:
  name: processor
  namespace: default
spec:
  selector:
    app: processor
  ports:
    - protocol: TCP
      port: 9002
      targetPort: 9002
---
apiVersion: v1
kind: Secret
metadata:
  name: client-tls
  namespace: default
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
# ext-proc policy targets Gateway, with backendRef to processor Service
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ext-proc
  namespace: default
spec:
  targetRefs:
    - kind: Gateway
      name: test
      group: gateway.networking.k8s.io
  traffic:
    phase: PreRouting
    extProc:
      backendRef:
        name: processor
        port: 9002
---
# backend TLS policy targets the processor Service (not the Gateway)
# This should still be associated with the gateway via the ext-proc policy's backendRef
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: processor-backend-tls
  namespace: default
spec:
  targetRefs:
    - kind: Service
      name: processor
      group: ""
  backend:
    tls:
      mtlsCertificateRef:
        - name: client-tls
      sni: processor.default.svc.cluster.local

---
# Output
output:
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      backend:
        backendTls:
          cert: 
          hostname: processor.default.svc.cluster.local
          key: 
      key: default/processor-backend-tls:tls:default/processor.default.svc.cluster.local
      name:
        kind: AgentgatewayPolicy
        name: processor-backend-tls
        namespace: default
      target:
        service:
          hostname: processor.default.svc.cluster.local
          namespace: default
- gateway:
    Name: test
    Namespace: default
  resource:
    policy:
      key: traffic/default/ext-proc:extproc:default/test
      name:
        kind: AgentgatewayPolicy
        name: ext-proc
        namespace: default
      target:
        gateway:
          name: test
          namespace: default
      traffic:
        extProc:
          target:
            port: 9002
            service:
              hostname: processor.default.svc.cluster.local
              namespace: default
        phase: GATEWAY
status: []
