_err: deploymentName is required for this apiVersion
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: azure-invalid-deployment-name
spec:
  ai:
    provider:
      azureopenai:
        apiVersion: 2024-01-01
        endpoint: test
