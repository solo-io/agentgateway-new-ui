_err: AI policies require AI
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: ai-pol-without-ai
spec:
  static:
    host: example.com
    port: 80
  policies:
    ai:
      defaults:
        - field: hi
          value: 1
---
_err: MCP policies require MCP
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp-pol-without-mcp
spec:
  static:
    host: example.com
    port: 80
  policies:
    mcp:
      authorization:
        policy:
          matchExpressions:
          - 'true'
---
_err: unknown fields
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp-static-target-authentication
spec:
  mcp:
    targets:
    - name: target
      static:
        host: example.com
        port: 443
        policies:
          mcp:
            authentication:
              issuer: https://issuer.example.com/
              jwks:
                backendRef:
                  name: jwks
                  port: 443
                jwksPath: /.well-known/jwks.json
