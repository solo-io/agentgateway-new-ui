      terminationGracePeriodSeconds: 60
      volumes:
      - configMap:
          name: gw
        name: config-volume
      - name: xds-token
        projected:
          sources:
          - serviceAccountToken:
              audience: agentgateway
              expirationSeconds: 43200
              path: xds-token
      - emptyDir: {}
        name: tmp
status: {}
