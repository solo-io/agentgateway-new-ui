binds:
- port: 3002
  listeners:
  - protocol: HTTP
    name: asdf
    hostname: '*'
    routes:
    - backends:
      - mcp:
          targets:
          - name: time
            stdio:
              cmd: uvx
              args:
              - mcp-server-time
          - name: everything
            stdio:
              cmd: npx
              args:
              - '@modelcontextprotocol/server-everything'
      policies:
        cors:
          allowOrigins:
          - '*'
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
- port: 8080
  tunnelProtocol: direct
  listeners: []
- port: 8081
  tunnelProtocol: direct
  listeners: []
llm:
  models:
  - name: model-1
    provider: openAI
mcp:
  targets: []
frontendPolicies: {}
